services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3003:3000'
    environment:
      - DATABASE_URL=postgresql://leo:123456@db:5432/crm
      - DB_HOST=db
      - DB_USER=leo
      - DB_PASSWORD=123456
      - DB_NAME=crm
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: leo
      POSTGRES_PASSWORD: 123456
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
