services:
  nginx:
    image: nginx:alpine
    container_name: crm-lms-nginx
    ports:
      - "80:80"
      # - "443:443" # Uncomment if setting up SSL
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    restart: always
    logging: &logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-lms-api_prod
    expose:
      - "3001"
    env_file:
      - .env.production.local
    environment:
      # DATABASE_URL is loaded from .env.production.local
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *logging

  worker:
    build: .
    command: ["node", "dist/src/worker.js"]
    container_name: crm-lms-worker
    env_file:
      - .env.production.local
    environment:
      - DATABASE_URL=postgresql://leo:prod1@db:5432/crm_prod
    depends_on:
      db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *logging

  db:
    image: postgres:13
    container_name: crm-lms-db_prod
    environment:
      POSTGRES_DB: crm_prod
      POSTGRES_USER: leo
      POSTGRES_PASSWORD: prod1
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leo -d crm_prod']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    logging: *logging
    ports:
      - "5432:5432" # Exposed for local debugging, remove for prod isolation

volumes:
  db-data:
